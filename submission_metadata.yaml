# Redrob Hackathon — Submission Metadata
# ============================================================================
# Team identity
# ============================================================================
team_name: "ArchForge"  # Used in leaderboard and announcements

primary_contact:
  name: "Archishman Das"
  email: "gowork.archis@gmail.com"   # Used for all organizer communication
  phone: "+91-8016166683"        # Used for top-50 / top-10 outreach

team_members:
  - name: "Archishman Das"
    email: "gowork.archis@gmail.com"
    role: "Leader"          # Optional, e.g. "Team Lead", "Backend", "Data"

# ============================================================================
# Code and reproducibility
# ============================================================================
github_repo: "https://github.com/gowork-archis/redrob-candidate-ranker"
# Required. Must be reachable. Private repos OK if you can grant organizer
# access at Stage 3 (the email to add will be communicated then).

sandbox_link: "https://huggingface.co/spaces/gowork-archis/redrob-ranker"
# Required. A working hosted environment where the ranker can be run on a small
# candidate sample. See Section 10.5 of submission_spec.md for acceptable
# platforms (HuggingFace Spaces, Streamlit Cloud, Replit, Colab, Docker, Binder).

reproduce_command: "python rank.py --candidates ./candidates.jsonl --out ./submission.csv"
# The single command that produces submission.csv from candidates.jsonl.
# Should run end-to-end within 5 minutes on CPU with 16GB RAM and no network.

# ============================================================================
# Compute environment
# ============================================================================
compute:
  platform: "Local Windows PC"                  # Or: "AWS EC2 c5.4xlarge", "Local Linux box", etc.
  cpu_cores: 12                                 # Number of CPU cores used
  ram_gb: 8                                     # Available RAM in GB
  python_version: "3.14.5"                      # python --version
  os: "Windows 11"                              # Or "Ubuntu 22.04 LTS", etc.
  uses_gpu_for_inference: false                 # Must be false — see compute constraints
  has_network_during_ranking: false             # Must be false — no API calls during ranking
  pre_computation_required: false               # true if you pre-compute embeddings or train models offline
  pre_computation_time_minutes: 0               # Approximate, if applicable

# ============================================================================
# AI tools declaration
# ============================================================================
ai_tools_used:
  - "Gemini"
  - "Cursor"
  - "Claude"
  - "GitHub Copilot"

ai_usage_summary: |
  Used Gemini for code optimization, debugging, and architectural review. No candidate data was transmitted to external APIs during ranking.

# ============================================================================
# Approach summary (optional but recommended)
# ============================================================================
methodology_summary: |
  Highly optimized, memory-efficient rule-based ranker using a binary min-heap for streaming 100K candidates line-by-line in O(1) memory. Features five weighted scores (Career, Skills, Experience, Location, Education) combined with a log-scaled behavioral availability multiplier. Implements advanced date-math validation to eliminate honeypots and handles time-drift grading bugs with a fixed evaluation clock.

# ============================================================================
# Declarations
# ============================================================================
declarations:
  read_submission_spec: true        # I have read submission_spec.md in full
  code_is_original_work: true       # My code is my team's original work (using AI as a tool is fine)
  no_collusion: true                # I have not coordinated my submission with other teams
  honeypot_check_done: true         # OPTIONAL — set true if you explicitly checked for honeypots in your ranking
  reproduction_tested: true         # I have tested that my reproduce_command runs end-to-end
